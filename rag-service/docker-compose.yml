# 로컬 개발용 Neo4j (프로덕션은 AuraDB 사용)
services:
  neo4j:
    image: neo4j:5.20
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/localpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
